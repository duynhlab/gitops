# Shared Helm chart for all services (same chart used across environments).
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: mop-chart-oci
  namespace: flux-system
spec:
  interval: 10m
  url: oci://ghcr.io/duynhlab/helm-charts/mop
  ref:
    semver: ">=0.13.0"
# The beta / prod-us / prod-eu Kustomizations are added here by the Backstage
# "Enable Environment" template when a service is promoted beyond staging.
