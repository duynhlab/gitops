# Materialises checkout's app secret into a native Secret the HelmRelease
# consumes. References the per-service SecretStore (see secret-store.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: checkout-secrets
  namespace: checkout-staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: checkout-fake
  target:
    name: checkout-secrets
    creationPolicy: Owner
  data:
    - secretKey: app-secret
      remoteRef:
        key: checkout/staging/app-secret
