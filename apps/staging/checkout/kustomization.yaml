apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrelease.yaml
  - secret-store.yaml
  - externalsecret.yaml
# values-base.yaml + values-staging.yaml become ConfigMaps the HelmRelease
# reads via valuesFrom. disableNameSuffixHash keeps the names stable so the
# valuesFrom refs don't break; Flux still reconciles when the content changes.
configMapGenerator:
  - name: checkout-values-base
    namespace: checkout-staging
    files:
      - values-base.yaml=../../base/checkout/values-base.yaml
  - name: checkout-values-staging
    namespace: checkout-staging
    files:
      - values-staging.yaml
generatorOptions:
  disableNameSuffixHash: true
