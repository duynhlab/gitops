# Per-service SecretStore for checkout in staging. On Kind this is the External
# Secrets Operator `fake` provider (static demo value, no backend) — kept
# per-service+env so onboarding/enabling a service only ADDS files, never edits
# a shared store. In a real cluster, drop this and point the ExternalSecret at
# the shared ClusterSecretStore backed by Vault / AWS Secrets Manager.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: checkout-fake
  namespace: checkout-staging
spec:
  provider:
    fake:
      data:
        - key: checkout/staging/app-secret
          value: "staging-demo-secret-CHANGEME"
