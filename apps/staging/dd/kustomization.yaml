apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrelease.yaml
  - secret-store.yaml
  - externalsecret.yaml
configMapGenerator:
  - name: dd-values-base
    namespace: dd-staging
    files:
      - values-base.yaml=../../base/dd/values-base.yaml
  - name: dd-values-staging
    namespace: dd-staging
    files:
      - values-staging.yaml
generatorOptions:
  disableNameSuffixHash: true
