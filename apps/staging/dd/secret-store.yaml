# Per-service SecretStore (ESO fake provider on Kind — static demo value, no
# backend). Real clusters drop this and use a shared ClusterSecretStore → Vault.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: dd-fake
  namespace: dd-staging
spec:
  provider:
    fake:
      data:
        - key: dd/staging/app-secret
          value: "staging-demo-secret-CHANGEME"
