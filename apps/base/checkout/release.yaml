# Environment-invariant HelmRelease for checkout. Each environment overlay
# (apps/<env>/checkout) sets: namespace, replicaCount, image.tag and the full
# env var list (the per-env file is the source of truth for runtime config).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: checkout
  labels:
    backstage.io/kubernetes-id: checkout
spec:
  interval: 5m
  timeout: 5m
  releaseName: checkout
  chartRef:
    kind: OCIRepository
    name: mop-chart-oci
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    name: checkout

    image:
      repository: ghcr.io/duynhlab/checkout-service/checkout-service
      pullPolicy: IfNotPresent

    service:
      enabled: true
      type: ClusterIP
      http:
        port: 8080
        containerPort: 8080

    resources:
      requests:
        memory: "24Mi"
        cpu: "20m"
      limits:
        memory: "64Mi"
        cpu: "50m"

    livenessProbe:
      enabled: true
      httpGet:
        path: /health
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10

    readinessProbe:
      enabled: true
      httpGet:
        path: /ready
        port: 8080
      initialDelaySeconds: 5
      periodSeconds: 5
