# Environment-invariant Helm values for dd (mop chart).
# Merged first; values-<env>.yaml overrides on top via HelmRelease valuesFrom.
name: dd

image:
  repository: nginx
  pullPolicy: IfNotPresent

service:
  enabled: true
  type: ClusterIP
  http:
    port: 8080
    containerPort: 8080

resources:
  requests:
    memory: "24Mi"
    cpu: "20m"
  limits:
    memory: "64Mi"
    cpu: "50m"

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  enabled: true
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
